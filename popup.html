<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    
    .header {
      margin-bottom: 15px;
    }
    
    .header h2 {
      margin: 0 0 5px 0;
      color: #0073b1;
      font-size: 16px;
    }
    
    .header p {
      margin: 0;
      color: #666;
      font-size: 12px;
    }
    
    .goal-input {
      margin-bottom: 15px;
    }
    
    .goal-input label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    
    .goal-input input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    
    .button-group {
      text-align: right;
    }
    
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 8px;
    }
    
    .btn-primary {
      background-color: #0073b1;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: #005885;
    }
    
    .btn-secondary {
      background-color: #f3f2ef;
      color: #333;
    }
    
    .btn-secondary:hover {
      background-color: #e9e5df;
    }
    
    .current-goal {
      background-color: #f8f9fa;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    
    .current-goal strong {
      color: #0073b1;
    }
    
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }
    
    .status.success {
      background-color: #d4edda;
      color: #155724;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Career Goal Setup</h2>
    <p>Help us show you relevant questions while browsing LinkedIn</p>
  </div>
  
  <div id="currentGoal" class="current-goal" style="display: none;">
    <strong>Current Goal:</strong> <span id="goalText"></span>
  </div>
  
  <div class="goal-input">
    <label for="careerGoal">What role are you targeting?</label>
    <input 
      type="text" 
      id="careerGoal" 
      placeholder="e.g., Software Engineer, Product Manager, Data Scientist"
      maxlength="100"
    >
  </div>
  
  <div class="button-group">
    <button class="btn btn-secondary" id="clearBtn" style="display: none;">Clear</button>
    <button class="btn btn-primary" id="saveBtn">Save Goal</button>
  </div>
  
  <div id="status" class="status" style="display: none;"></div>
  
  <script src="popup.js"></script>
</body>
</html>
